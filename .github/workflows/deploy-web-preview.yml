# Preview deployment for feature branches. Deploys to a separate Cloud Run service
# so production is never affected. Triggers on push to no-ticket/ux-v2 or manually.
#
# After the FIRST deploy, grab the preview URL from the job summary and add it to
# the API's CORS_ORIGIN (comma-separated alongside the prod URL) via:
#   gcloud run services update <CLOUD_RUN_SERVICE_API> --update-env-vars CORS_ORIGIN="<prod>,<preview>"

name: Deploy Web Preview

on:
  push:
    branches:
      - no-ticket/ux-v2
    paths:
      - "apps/web/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - ".github/workflows/deploy-web-preview.yml"
  workflow_dispatch: {}

env:
  GCP_PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
  GCP_REGION: ${{ vars.GCP_REGION }}
  ARTIFACT_REGISTRY_REPO: ${{ vars.ARTIFACT_REGISTRY_REPO }}
  PREVIEW_SERVICE_NAME: ${{ vars.CLOUD_RUN_SERVICE_WEB }}-preview
  WIF_PROVIDER: ${{ vars.WIF_PROVIDER }}
  WIF_SERVICE_ACCOUNT: ${{ vars.WIF_SERVICE_ACCOUNT }}
  NEXT_PUBLIC_API_URL: ${{ vars.NEXT_PUBLIC_API_URL }}
  CLOUD_RUN_RUNTIME_SA_WEB: ${{ vars.CLOUD_RUN_RUNTIME_SA_WEB }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.WIF_PROVIDER }}
          service_account: ${{ env.WIF_SERVICE_ACCOUNT }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Docker login (Artifact Registry)
        run: |
          gcloud auth print-access-token | docker login -u oauth2accesstoken --password-stdin "https://${{ env.GCP_REGION }}-docker.pkg.dev"

      - name: Build and push image
        env:
          NEXT_PUBLIC_FIREBASE_API_KEY: ${{ vars.NEXT_PUBLIC_FIREBASE_API_KEY }}
          NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: ${{ vars.NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN }}
          NEXT_PUBLIC_FIREBASE_PROJECT_ID: ${{ vars.NEXT_PUBLIC_FIREBASE_PROJECT_ID }}
          NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: ${{ vars.NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET }}
          NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: ${{ vars.NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID }}
          NEXT_PUBLIC_FIREBASE_APP_ID: ${{ vars.NEXT_PUBLIC_FIREBASE_APP_ID }}
        run: |
          IMAGE="${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/${{ env.ARTIFACT_REGISTRY_REPO }}/web-preview:${{ github.sha }}"
          docker build -f apps/web/Dockerfile \
            --build-arg NEXT_PUBLIC_API_URL="${{ env.NEXT_PUBLIC_API_URL }}" \
            --build-arg NEXT_PUBLIC_FIREBASE_API_KEY \
            --build-arg NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN \
            --build-arg NEXT_PUBLIC_FIREBASE_PROJECT_ID \
            --build-arg NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET \
            --build-arg NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID \
            --build-arg NEXT_PUBLIC_FIREBASE_APP_ID \
            -t "$IMAGE" .
          docker push "$IMAGE"

      - name: Deploy to Cloud Run (preview)
        run: |
          IMAGE="${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/${{ env.ARTIFACT_REGISTRY_REPO }}/web-preview:${{ github.sha }}"
          SA_ARGS=()
          if [ -n "${{ env.CLOUD_RUN_RUNTIME_SA_WEB }}" ]; then
            SA_ARGS+=(--service-account="${{ env.CLOUD_RUN_RUNTIME_SA_WEB }}")
          fi
          gcloud run deploy ${{ env.PREVIEW_SERVICE_NAME }} \
            --image "$IMAGE" \
            --region ${{ env.GCP_REGION }} \
            --project ${{ env.GCP_PROJECT_ID }} \
            --platform managed \
            --allow-unauthenticated \
            --set-env-vars "NODE_ENV=production" \
            "${SA_ARGS[@]}"

      - name: Print preview URL
        run: |
          PREVIEW_URL=$(gcloud run services describe "${{ env.PREVIEW_SERVICE_NAME }}" \
            --region "${{ env.GCP_REGION }}" \
            --project "${{ env.GCP_PROJECT_ID }}" \
            --format='value(status.url)')
          echo "### Preview URL" >> $GITHUB_STEP_SUMMARY
          echo "$PREVIEW_URL" >> $GITHUB_STEP_SUMMARY
          echo ""
          echo "Preview: $PREVIEW_URL"
