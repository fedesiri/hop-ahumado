# Aplica migraciones Prisma en la base de producción (manual).
# Requiere: WIF, variable CLOUD_SQL_INSTANCE, secreto MIGRATE_DATABASE_URL (URL TCP vía 127.0.0.1, ver docs/gcp-setup.md).
# La SA github-actions@... necesita roles/cloudsql.client (incluido en scripts/gcp-iam-bootstrap.sh).

name: Migrate API database (Prisma)

on:
  workflow_dispatch: {}

env:
  WIF_PROVIDER: ${{ vars.WIF_PROVIDER }}
  WIF_SERVICE_ACCOUNT: ${{ vars.WIF_SERVICE_ACCOUNT }}
  CLOUD_SQL_INSTANCE: ${{ vars.CLOUD_SQL_INSTANCE }}

jobs:
  migrate:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.WIF_PROVIDER }}
          service_account: ${{ env.WIF_SERVICE_ACCOUNT }}

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies (api + prisma CLI)
        run: pnpm install --frozen-lockfile --filter api...

      - name: Validate CLOUD_SQL_INSTANCE
        run: |
          if [ -z "${{ env.CLOUD_SQL_INSTANCE }}" ]; then
            echo "Definí la variable de GitHub CLOUD_SQL_INSTANCE (mismo valor que en deploy-api)."
            exit 1
          fi

      - name: Install Cloud SQL Auth Proxy
        run: |
          curl -fsSL -o cloud-sql-proxy https://storage.googleapis.com/cloud-sql-connectors/cloud-sql-proxy/v2.14.3/cloud-sql-proxy.linux.amd64
          chmod +x cloud-sql-proxy

      - name: Start proxy and run migrations
        env:
          DATABASE_URL: ${{ secrets.MIGRATE_DATABASE_URL }}
        run: |
          if [ -z "$DATABASE_URL" ]; then
            echo "Creá el secreto de GitHub MIGRATE_DATABASE_URL (URL TCP a 127.0.0.1:5432 — ver docs/gcp-setup.md)."
            exit 1
          fi
          ./cloud-sql-proxy "${{ env.CLOUD_SQL_INSTANCE }}" --port 5432 &
          echo "Esperando al proxy en 127.0.0.1:5432..."
          for i in $(seq 1 45); do
            if timeout 1 bash -c 'cat < /dev/null > /dev/tcp/127.0.0.1/5432' 2>/dev/null; then
              echo "Proxy listo."
              break
            fi
            if [ "$i" -eq 45 ]; then
              echo "Timeout (revisá CLOUD_SQL_INSTANCE y roles/cloudsql.client en github-actions@...)."
              exit 1
            fi
            sleep 1
          done
          pnpm --filter api exec prisma migrate deploy
